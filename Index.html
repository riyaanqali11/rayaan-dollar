<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Report</title>

    <style>
        body{
            font-family:sens-serif;
        }

        table{
            width:60%;
            margin:auto;
            border-collapse:collapse;
            text-align:center;
        }

        thead{
            background:#007bff;
            color:white;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
        }

        tbody tr:hover{
            background:lightblue;
        }

        .edit{
            background:green;
            color:white;
            border:none;
            padding:8px 15px;
            border-radius:5px;
            cursor:pointer;
        }

        .delete{
            background:red;
            color:white;
            border:none;
            padding:8px 15px;
            border-radius:5px;
            cursor:pointer;
        }

        .edit:hover{
            background:darkgreen;
        }

        .delete:hover{
            background:darkred;
        }
    </style>

</head>
